name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Subdirectory to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "deploy-bot@github-actions.org"
          git config --global user.name "GitHub Actions Deploy Bot"
          
          # Split the backend directory into a temporary branch
          git subtree split --prefix backend -b temp-deploy-branch
          
          # Force push the temporary branch to Hugging Face Spaces
          git push https://tawassulgoharellahi:$HF_TOKEN@huggingface.co/spaces/tawassulgoharellahi/ai-image-detector-backend temp-deploy-branch:main --force
